version: 38
jobs:
- name: Build for x86_64
  steps:
  - !CheckoutStep
    name: Checkout
    cloneCredential: !DefaultCredential {}
    withLfs: true
    withSubmodules: false
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  - !CommandStep
    name: Execute build
    runInContainer: true
    image: onedev.site.tesses.net/dependencies/dependencies:latest:aarch64
    interpreter: !DefaultInterpreter
      commands: |
        mkdir build
        cd build
        cmake -S .. -B . -DCMAKE_INSTALL_PREFIX=/usr
        make -j12
        make install DESTDIR=out
        cpack -G DEB
        curl --user $GITEA_USERPASS -X DELETE https://gitea-pkg.site.tesses.net/api/packages/tesses50/debian/pool/noble/main/tessesframework/1.0.0/amd64 || true
        curl --user $GITEA_USERPASS --upload-file TessesFramework-1.0.0-Linux.deb https://gitea-pkg.site.tesses.net/api/packages/tesses50/debian/pool/noble/main/upload
    envVars:
    - name: GITEA_USERPASS
      value: '@secret:GITEA_USERPASS@'
    useTTY: true
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  - !BuildImageStep
    name: Build Docker Image
    dockerfile: Dockerfile.run
    output: !RegistryOutput
      tags: onedev.site.tesses.net/tesses-framework/tesses-framework:latest
    registryLogins:
    - registryUrl: '@server_url@'
      userName: '@job_token@'
      passwordSecret: dockersecret
    platforms: linux/amd64
    condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL
  triggers:
  - !BranchUpdateTrigger
    projects: tesses-framework
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 14400
